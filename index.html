function Navbar({ page, setPage }) {
  const [dropdownOpen, setDropdownOpen] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  const [mobileServicesOpen, setMobileServicesOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);
  const dropRef = useRef(null);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  useEffect(() => {
    const handler = (e) => {
      if (dropRef.current && !dropRef.current.contains(e.target)) setDropdownOpen(false);
    };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const navItems = [
    { id: "home", label: "Home" },
    { id: "about", label: "About Us" },
    { id: "compliance", label: "Compliance Hub" },
    { id: "packages", label: "Premium Packages" },
    { id: "contact", label: "Contact Us" },
  ];

  const navTo = (id) => { setPage(id); setMobileOpen(false); setDropdownOpen(false); window.scrollTo(0,0); };

  return (
    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? "glass-dark shadow-2xl" : "bg-brand-navy/95"}`}>
      <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div className="flex items-center justify-between h-16 lg:h-18">

          {/* Logo */}

            <div className="w-9 h-9 rounded-xl gradient-emerald flex items-center justify-center shadow-lg group-hover:scale-110 transition-transform">
              <LIcon name="rocket" size={18} className="text-white" />
            </div>
            <span className="text-xl font-black text-white tracking-tight">
              Aarambhh<span className="text-emerald-400">.</span>
            </span>
          </button>

            {navItems.map(item => (
              <button key={item.id} onClick={() => navTo(item.id)}
                className={`nav-link text-sm font-medium transition-colors ${page === item.id ? "text-emerald-400" : "text-slate-300 hover:text-white"}`}>
                {item.label}
              </button>

            <div className="relative" ref={dropRef}>

/* ═══════════════════════════════════════════
   COMPONENT: MCA Name Checker Widget
   ═══════════════════════════════════════════ */
function MCANameChecker() {
  const [name, setName] = useState("");
  const [status, setStatus] = useState(null); // null | "checking" | "available" | "taken"

  const TAKEN_NAMES = ["tata", "infosys", "reliance", "wipro", "flipkart", "swiggy", "zomato", "razorpay", "paytm", "ola"];

  const checkName = () => {
    if (!name.trim()) return;
    setStatus("checking");
    setTimeout(() => {
      const lower = name.toLowerCase().trim();
      const isTaken = TAKEN_NAMES.some(n => lower.includes(n));
      setStatus(isTaken ? "taken" : "available");
    }, 1800);
  };

  return (
    <div className="bg-white rounded-2xl shadow-xl border border-slate-100 p-6 mt-5">
      <div className="flex items-center gap-2 mb-4">
        <div className="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center">
          <LIcon name="search" size={16} className="text-blue-600" />
        </div>
        <div>
          <h3 className="font-bold text-slate-800 text-sm">MCA Name Availability Check</h3>
          <p className="text-xs text-slate-500">Instantly verify your company name</p>
        </div>
      </div>
      <div className="flex gap-2">
        <input
          type="text"
          value={name}
          onChange={e => { setName(e.target.value); setStatus(null); }}
          onKeyDown={e => e.key === "Enter" && checkName()}
          placeholder="Enter proposed company name…"
          className="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent"
        />
        <button onClick={checkName} disabled={status === "checking"}
          className="px-5 py-2.5 rounded-xl bg-brand-navy text-white text-sm font-semibold hover:bg-slate-700 transition-colors disabled:opacity-60 whitespace-nowrap">
          {status === "checking" ? "Checking…" : "Check Now"}
        </button>
      </div>

      {status === "checking" && (
        <div className="mt-4 flex items-center gap-3 px-4 py-3 rounded-xl bg-blue-50 border border-blue-100">
          <div className="w-4 h-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin flex-shrink-0"></div>
          <p className="text-sm text-blue-700 font-medium">Searching MCA database for <strong>"{name}"</strong>…</p>
        </div>
      )}

      {status === "available" && (
        <div className="mt-4 rounded-xl bg-emerald-50 border border-emerald-200 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xl">🎉</span>
            <p className="font-bold text-emerald-700">Name Available for Registration!</p>
          </div>
          <p className="text-sm text-emerald-600 mb-3"><strong>"{name} Private Limited"</strong> appears available on the MCA database. Reserve it today before someone else does!</p>
          <button onClick={() => window.open(GOOGLE_FORM_URL, "_blank")}
            className="w-full py-2.5 rounded-lg gradient-emerald text-white text-sm font-bold hover:opacity-90 transition-opacity">
            🚀 Register This Name Now – Starting ₹6,999
          </button>
        </div>
      )}

      {status === "taken" && (
        <div className="mt-4 rounded-xl bg-red-50 border border-red-200 p-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xl">❌</span>
            <p className="font-bold text-red-700">Name Already Taken</p>
          </div>
          <p className="text-sm text-red-600 mb-3"><strong>"{name}"</strong> conflicts with an existing registered entity on MCA. Try adding a unique keyword or suffix.</p>
          <button onClick={() => window.open(GOOGLE_FORM_URL, "_blank")}
            className="w-full py-2.5 rounded-lg bg-brand-navy text-white text-sm font-bold hover:bg-slate-700 transition-colors">
            💡 Get Expert Name Suggestions – Free Consultation
          </button>
        </div>
      )}
      <p className="text-xs text-slate-400 mt-3 text-center">*Simulated preview. Final availability confirmed via official MCA portal.</p>
    </div>
  );
}

                        className="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 resize-none" />
                    </div>
                    <button type="submit"
                      className="w-full py-4 rounded-xl gradient-emerald text-white font-black text-sm hover:opacity-90 transition-opacity shadow-lg">
                      📞 Schedule My Free Callback
                    </button>
                    <p className="text-center text-slate-400 text-xs">Your information is 100% confidential. We never share or sell your data.</p>
                  </form>
                </div>
              ) : (
                <div className="bg-white rounded-3xl p-8 border border-slate-100 shadow-xl text-center">
                  <div className="w-20 h-20 rounded-full bg-emerald-50 flex items-center justify-center mx-auto mb-6">

                  <p className="text-slate-600 mb-2">Thank you, <strong>{form.name}</strong>! One of our legal consultants will call you at <strong>{form.phone}</strong> within the next 30 minutes.</p>

                  <button onClick={() => setSubmitted(false)}
                    className="px-6 py-3 rounded-xl border border-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors">
                    Submit Another Request
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      </section>
      <JoinSection />
    </div>
  );
}

/* ═══════════════════════════════════════════
   ROOT APP
   ═══════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState("home");

  const currentService = SERVICES.find(s => s.id === page);

  const renderPage = () => {
    if (currentService) return <ServicePage service={currentService} setPage={setPage} />;
    switch(page) {
      case "home":       return <HomePage setPage={setPage} />;
      case "about":      return <AboutPage />;
      case "compliance": return <CompliancePage />;
      case "packages":   return <PackagesPage />;
      case "contact":    return <ContactPage />;
      default:           return <HomePage setPage={setPage} />;
    }
  };

  return (
    <div className="min-h-screen flex flex-col">
      <Navbar page={page} setPage={setPage} />
      <main className="flex-1">
        {renderPage()}
      </main>
      <Footer setPage={setPage} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
